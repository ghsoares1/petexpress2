<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Conta - PetExpress</title>
  <link rel="stylesheet" href="style-minha-conta.css" />
</head>
<body>
  <header class="account-header">
    <a href="index.html" class="brand-link">
      <img src="img/lg.png" alt="Logo PetExpress" class="logo" />
    </a>
    <h1>Minha Conta</h1>
  </header>

  <main class="account-page">
    <section class="account-card">
      <div class="account-card-header">
        <div>
          <span class="eyebrow">Perfil</span>
          <h2>Dados Cadastrados</h2>
        </div>
        <button id="logoutBtn" class="btn-ghost">Sair da conta</button>
      </div>

      <form id="accountForm" class="account-form">
        <div class="form-grid">
          <label>
            Nome
            <input id="nome" name="nome" type="text" required />
          </label>
          <label>
            Sobrenome
            <input id="sobrenome" name="sobrenome" type="text" required />
          </label>
          <label>
            E-mail
            <input id="email" name="email" type="email" required />
          </label>
          <label>
            CPF
            <input id="cpf" name="cpf" type="text" required />
          </label>
          <label>
            Endereço
            <input id="endereco" name="endereco" type="text" required />
          </label>
          <label>
            Complemento
            <input id="complemento" name="complemento" type="text" />
          </label>
          <label>
            Bairro
            <input id="bairro" name="bairro" type="text" required />
          </label>
          <label>
            CEP
            <input id="cep" name="cep" type="text" required />
          </label>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Salvar alterações</button>
          <span class="feedback" id="accountFeedback"></span>
        </div>
      </form>
    </section>

  </main>

  <script src="minha-conta-js.js"></script>
</body>
</html>
