<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus Pedidos - PetExpress</title>
  <link rel="stylesheet" href="style-index.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 30px 24px 60px;
    }

    .page-title {
      font-size: 32px;
      margin-bottom: 24px;
      color: #222;
      font-weight: 800;
    }

    .orders-grid {
      display: grid;
      gap: 20px;
    }

    .empty-message {
      padding: 40px 24px;
      background: #fff9f1;
      border: 1px solid #ffd0a0;
      border-radius: 22px;
      color: #d35400;
      font-size: 18px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(255, 130, 0, 0.12);
    }

    .order-card {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      border: 1px solid rgba(255, 136, 0, 0.12);
    }

    .order-card-header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      padding: 24px;
      background: linear-gradient(180deg, rgba(255, 152, 0, 0.12), transparent);
    }

    .order-card-header div strong {
      display: block;
      font-size: 20px;
      margin-bottom: 8px;
      color: #222;
    }

    .order-card-header div span {
      color: #555;
      font-size: 14px;
    }

    .order-status {
      color: #ff7b00;
      font-weight: 800;
      text-transform: uppercase;
      font-size: 13px;
      letter-spacing: 0.06em;
    }

    .order-content {
      padding: 22px 24px 26px;
      display: grid;
      gap: 18px;
    }

    .order-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: #333;
      font-size: 15px;
    }

    .order-summary strong {
      color: #ff7b00;
      font-size: 18px;
    }

    .order-items-list {
      display: grid;
      gap: 12px;
      padding-top: 10px;
      border-top: 1px solid #f0f0f0;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      background: #fff7ef;
      border: 1px solid #ffe0c0;
      border-radius: 14px;
      padding: 14px 16px;
      color: #333;
      font-size: 14px;
    }

    .item-row span {
      max-width: 70%;
    }

    .item-row strong {
      color: #ff6600;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo-link">
      <img src="img/lg.png" alt="Logo PetExpress" class="logo">
    </a>
    <div class="busca">
      <form id="form-busca" autocomplete="off">
        <div id="box-busca-container">
          <div id="box-busca" class="campo-busca">
            <input type="text" id="busca" placeholder="Buscar produtos, rações, acessórios..." />
            <button type="submit"><i class="fas fa-search"></i></button>
          </div>
          <ul id="sugestoes-busca"></ul>
        </div>
      </form>
    </div>

    <div class="icones">
      <a id="accountLink" href="login.html"><i class="fas fa-user"></i><span>Conta</span></a>
      <a href="carrinho.html"><i class="fas fa-shopping-cart"></i><span>Carrinho</span></a>
      <a href="pedidos.html" class="area-pedidos-link"><i class="fas fa-box-open"></i><span>Meus Pedidos</span></a>
    </div>
  </header>

  <main>
    <h1 class="page-title">Meus pedidos</h1>
    <div id="ordersContainer" class="orders-grid"></div>
  </main>

  <script src="pedidos-js.js"></script>
</body>
</html>
